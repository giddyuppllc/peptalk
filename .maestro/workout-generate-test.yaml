# PepTalk — verify the workout generator actually produces a workout.
# Deep-links to the generator, taps "Build my 30-day plan", confirms it lands
# on the 30-Day Plan screen with real day rows (proves the AI path OR the
# deterministic fallback works end-to-end). Dev/sim build, logged in.
appId: com.peptalkapp.peptalk
tags:
  - smoke
---
- launchApp
- tapOn:
    text: "Cancel"
    optional: true
- extendedWaitUntil:
    visible: "Hi, reviewer|Welcome|Home"
    timeout: 30000
- openLink:
    link: "peptalk://workouts/generate"
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible: "Build my 30-day plan|Generate Workout|TRAINING GOAL"
    timeout: 15000
- takeScreenshot: wkt-generate-before
# The CTA is "Build my 30-day plan" near the bottom. In a DEV build the LogBox
# warning toast overlaps the very bottom edge, so tap by a coordinate that
# lands on the button ABOVE the toast (≈87% height) rather than by text.
- tapOn:
    point: "50%, 87%"
# AI call (if aimee-workout is deployed) or instant deterministic fallback —
# wait for the 30-Day Plan screen with its day rows.
- extendedWaitUntil:
    visible: "30-Day Plan|Day 1|Day 2|Rest day|Upper Push|Lower"
    timeout: 50000
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: wkt-generate-result
