# PepTalk — capture the Pro-only FEATURE screens.
#
# Uses expo-router deep links (scheme "peptalk://") to jump straight to each
# Pro-gated screen — far more reliable than tapping through a UI that exposes
# almost no accessibility labels. Each openLink raises an "Open in PepTalk?"
# system prompt that we confirm by tapping "Open".
#
# Requires: dev/sim build already loaded + logged in (Pro auto-granted in
# non-production builds). Metro must be running.
#
#   DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
#     maestro --device <sim-udid> test .maestro/pro-features.yaml
appId: com.peptalkapp.peptalk
tags:
  - screenshots
---
- launchApp
# Clear any leftover "Open in PepTalk?" scheme prompt from a prior run.
- tapOn:
    text: "Cancel"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Hi, reviewer|Welcome|Home"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 3000

# --- Aimee chat (Pro: 300 chats/day) ---
- openLink:
    link: "peptalk://peptalk"
- tapOn:
    text: "Open"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: feat-aimee-chat

