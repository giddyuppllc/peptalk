# PepTalk — CRITICAL login smoke test.
#
# This is the exact path Apple's reviewer got stuck on in v1.9.8 build 47
# ("cannot continue after login"). If this flow ever fails, do NOT submit.
#
#   maestro test .maestro/login.yaml \
#     -e EMAIL=reviewer@peptalk.bio -e PASSWORD=<reviewer-password>
#
# Creds are passed as env vars so they never live in git.
#
# NOTE: clearState wipes app storage but NOT the Supabase session (stored in
# the iOS Keychain), so a previously-signed-in build boots straight to the
# tabs. The login steps are therefore CONDITIONAL — they run only when the
# auth screen is actually present (a fresh device / CI), and are skipped when
# a session persists. Either way the flow asserts the user lands IN the app
# (the 2.1a "can't get past login" guarantee).
appId: com.peptalkapp.peptalk
tags:
  - smoke
  - release-blocker
---
- launchApp:
    clearState: true

# Conditional login — only when the auth/onboarding "Sign In" affordance shows.
- runFlow:
    when:
      visible: "Sign In"
    commands:
      - tapOn: "Sign In"
      - assertVisible: "Email address"
      - tapOn: "Email address"
      - inputText: ${EMAIL}
      - tapOn: "Password"
      - inputText: ${PASSWORD}
      - hideKeyboard
      - tapOn:
          text: "Log in"
          index: 0
      - extendedWaitUntil:
          notVisible: "Email address"
          timeout: 20000

# PASS = we are in the app (home/tabs), with no auth error banner.
- extendedWaitUntil:
    visible: "Hi, reviewer|Welcome|Home|Profile"
    timeout: 20000
- assertNotVisible: "Invalid email or password"
- assertNotVisible: "Something went wrong"
- takeScreenshot: login-success
