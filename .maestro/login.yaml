# PepTalk — CRITICAL login smoke test.
#
# This is the exact path Apple's reviewer got stuck on in v1.9.8 build 47
# ("cannot continue after login"). If this flow ever fails, do NOT submit.
#
# Run against an iOS Simulator or a connected device that has a dev/preview
# build installed (e.g. `eas build -p ios --profile preview`, then install):
#
#   maestro test .maestro/login.yaml \
#     -e EMAIL=reviewer@peptalk.bio -e PASSWORD=<reviewer-password>
#
# Creds are passed as env vars so they never live in git. Refine any selector
# live with `maestro studio` if the app's copy changes.
#
# Selector notes (verified against build 1.9.8 on the iOS Simulator, 2026-06-16):
#   - The welcome CTA's accessibility label is "Get Started, " (trailing icon),
#     and Maestro text selectors are FULL-match regexes — hence "Get Started.*".
#   - "Sign In" is part of the row "Already have an account? Sign In" → ".*Sign In".
#   - The password field is reached via its placeholder "Enter password" (tapping
#     the "Password" section label does NOT focus the input).
#   - A dev build loads its JS bundle from Metro on launch, so we wait for the
#     first screen to render ("PepTalk" anchor) before asserting.
#   - iOS may show a system "Save Password?" sheet after submit — dismissed below.
#   - clearState does NOT clear the Supabase session (it lives in the Keychain),
#     so if a prior run left us logged in we sign out first to exercise a real
#     login. On a fresh App Store review install the app starts logged out and
#     this sign-out branch is simply skipped.
appId: com.peptalkapp.peptalk
tags:
  - smoke
  - release-blocker
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "PepTalk"
    timeout: 60000

# If a persisted session left us on the home screen, sign out to reach welcome.
- runFlow:
    when:
      visible: "Open profile"
    commands:
      - tapOn: "Open profile"
      - scrollUntilVisible:
          element:
            text: ".*Sign Out"
          direction: DOWN
          centerElement: true
          waitToSettleTimeoutMs: 1000
      - tapOn: ".*Sign Out"
      - extendedWaitUntil:
          visible: "Get Started.*"
          timeout: 20000

# 1) Onboarding "Welcome" screen → Sign In
- assertVisible: "Get Started.*"
- tapOn: ".*Sign In"

# 2) Auth screen — enter the reviewer credentials.
- assertVisible: "Email address"
- tapOn: "Email address"
- inputText: ${EMAIL}
- tapOn: "Enter password"
- inputText: ${PASSWORD}
- hideKeyboard

# 3) Submit
- tapOn:
    text: "Log in"
    index: 0

# Dismiss the iOS "Save Password?" system sheet if it appears.
- tapOn:
    text: "Not Now"
    optional: true

# 4) PASS = we left the auth screen and no error banner appeared.
#    The Email field is gone once we're on the tabs.
- extendedWaitUntil:
    notVisible: "Email address"
    timeout: 20000
- assertNotVisible: "Invalid email or password"
- assertNotVisible: "Something went wrong"
- takeScreenshot: login-success
